{{- range $name, $config := .Values.services }}
{{- if $config.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pow-anywhere.fullname" $ }}-{{ $name }}
  labels:
    {{- include "pow-anywhere.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  replicas: {{ $config.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "pow-anywhere.selectorLabels" $ | nindent 6 }}
      app: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "pow-anywhere.selectorLabels" $ | nindent 8 }}
        app: {{ $name }}
    spec:
      containers:
      - name: {{ $name }}
        image: "{{ $.Values.image.repository }}-{{ $name }}:{{ $.Values.image.tag }}"
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        ports:
        - containerPort: {{ $config.port }}
        env:
        - name: PORT
          value: "{{ $config.port }}"
        - name: REDIS_URL
          value: "redis://{{ include "pow-anywhere.fullname" $ }}-redis:6379"
        - name: RUNTIME_MODE
          value: {{ $.Values.runtimeMode }}
        - name: NODE_ENV
          value: "production"
        resources:
          {{- toYaml $config.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ $config.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ $config.port }}
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pow-anywhere.fullname" $ }}-{{ $name }}
  labels:
    {{- include "pow-anywhere.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  ports:
  - port: {{ $config.port }}
    targetPort: {{ $config.port }}
  selector:
    {{- include "pow-anywhere.selectorLabels" $ | nindent 4 }}
    app: {{ $name }}
{{- end }}
{{- end }}
